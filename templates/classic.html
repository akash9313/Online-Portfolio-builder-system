<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Resume</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --dark:#3e3e42;
  --light:#f4f4f4;
  --accent:#c9a227;
  --font:'Segoe UI', sans-serif;
}

body{
  margin:0;
  font-family:var(--font);
  background:#ddd;
}

.resume{
  max-width:1100px;
  margin:30px auto;
  display:flex;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.left{
  width:32%;
  background:var(--dark);
  color:white;
  padding:40px 30px;
}

.left img{
  width:140px;
  height:140px;
  border-radius:50%;
  display:block;
  margin-bottom:20px;
  object-fit:cover;
  cursor:pointer;
  border:3px solid white;
}

.left h3{
  border-bottom:1px solid #666;
  padding-bottom:5px;
  margin-top:25px;
}

.right{
  width:68%;
  padding:50px;
  background:var(--light);
}

.name{
  font-size:32px;
  font-weight:700;
  letter-spacing:2px;
}

.title{
  color:var(--accent);
  margin-bottom:20px;
}

.section{
  margin-top:30px;
}

.section h2{
  border-bottom:2px solid #999;
  padding-bottom:6px;
  margin-bottom:15px;
}

.timeline{
  border-left:2px solid #999;
  padding-left:15px;
}

.skill-bar{
  background:#ccc;
  height:6px;
  border-radius:4px;
  margin-top:4px;
}

.skill-bar div{
  height:6px;
  background:var(--accent);
  border-radius:4px;
}

[contenteditable="true"]:hover{
  background:#fff3c4;
  cursor:text;
}

.download{
  position:fixed;
  bottom:25px;
  right:25px;
  background:var(--dark);
  color:white;
  border:none;
  padding:12px 18px;
  cursor:pointer;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="resume" id="resume">

<div class="left">
  <img id="photo" src="https://via.placeholder.com/150">
  <input type="file" id="photoInput" hidden>

  <h3>ABOUT ME</h3>
  <p id="about" contenteditable="true"></p>

  <h3>LANGUAGES</h3>
  <div id="languages"></div>
</div>

<div class="right">

  <div class="name" id="name" contenteditable="true"></div>
  <div class="title" id="title" contenteditable="true"></div>

  <div style="margin-bottom:20px;">
    <span id="location" contenteditable="true"></span> |
    <span id="phone" contenteditable="true"></span> |
    <span id="email" contenteditable="true"></span>
  </div>

  <div class="section">
    <h2>WORK EXPERIENCE</h2>
    <div id="experience" class="timeline"></div>
  </div>

  <div class="section">
    <h2>EDUCATION</h2>
    <div id="education" class="timeline"></div>
  </div>

  <div class="section">
    <h2>SKILLS</h2>
    <div id="skills"></div>
  </div>

</div>
</div>

<button class="download" onclick="downloadPDF()">Download PDF</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4q_KzBCxVtS6mjH6Xh6-Bd1u-21RSNG4",
  authDomain: "portfoliox-2e787.firebaseapp.com",
  projectId: "portfoliox-2e787",
  storageBucket: "portfoliox-2e787.firebasestorage.app",
  messagingSenderId: "562709786891",
  appId: "1:562709786891:web:2d0f575ab7d3bda5fdf20e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="loginpage.html";
    return;
  }

  currentUser = user;
  await loadAllData();
});

/* LOAD ALL DATA */
async function loadAllData(){
  await loadProfile();
  await loadExperience();
  await loadEducation();
  await loadSkills();
  await loadLanguages();
}

/* PROFILE */
async function loadProfile(){
  const snap = await getDoc(doc(db,"users",currentUser.uid));
  if(!snap.exists()) return;

  const d = snap.data();

  name.innerText = d.name || "";
  title.innerText = d.title || "";
  about.innerText = d.about || "";
  location.innerText = d.location || "";
  phone.innerText = d.phone || "";
  email.innerText = d.email || "";

  if(d.photoURL){
    photo.src = d.photoURL;
  }
}

/* EXPERIENCE */
async function loadExperience(){
  const container = document.getElementById("experience");
  container.innerHTML="";

  const snap = await getDocs(collection(db,"users",currentUser.uid,"experience"));
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    container.innerHTML += `
      <div style="margin-bottom:15px;">
        <strong>${d.position || ""}</strong><br>
        <small>${d.company || ""} | ${d.duration || ""}</small>
        <p>${d.description || ""}</p>
      </div>`;
  });
}

/* EDUCATION (new structure) */
async function loadEducation(){
  const container = document.getElementById("education");
  container.innerHTML="";

  const snap = await getDoc(doc(db,"users",currentUser.uid));
  if(!snap.exists()) return;

  const edu = snap.data().education;
  if(!edu) return;

  if(edu.university){
    container.innerHTML += `
      <div style="margin-bottom:15px;">
        <strong>${edu.university.degree || ""}</strong><br>
        <small>${edu.university.name || ""} | ${edu.university.year || ""}</small>
      </div>`;
  }

  if(edu.school){
    container.innerHTML += `
      <div style="margin-bottom:15px;">
        <strong>School Education</strong><br>
        <small>${edu.school.name || ""} | ${edu.school.location || ""} | ${edu.school.year || ""}</small>
      </div>`;
  }
}

/* SKILLS */
async function loadSkills(){
  const container = document.getElementById("skills");
  container.innerHTML="";

  const snap = await getDocs(collection(db,"users",currentUser.uid,"skills"));
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    container.innerHTML += `
      <div style="margin-bottom:10px;">
        ${d.name || ""}
        <div class="skill-bar">
          <div style="width:${d.level || 80}%"></div>
        </div>
      </div>`;
  });
}

/* LANGUAGES */
async function loadLanguages(){
  const container = document.getElementById("languages");
  container.innerHTML="";

  const snap = await getDocs(collection(db,"users",currentUser.uid,"languages"));
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    container.innerHTML += `<div>${d.name || ""}</div>`;
  });
}

/* PHOTO UPLOAD */
photo.onclick = () => photoInput.click();

photoInput.onchange = (e)=>{
  const reader = new FileReader();
  reader.onload = ()=>{
    photo.src = reader.result;
  };
  reader.readAsDataURL(e.target.files[0]);
};

/* PDF */
window.downloadPDF = function(){
  html2pdf().from(document.getElementById("resume")).save("resume.pdf");
};
</script>

</body>
</html>
