<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Education | PortfolioX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="education.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Portfolio<span>X</span></div>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</header>

<div class="layout">

  <aside class="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="skills.html">Skills</a>
    <a class="active" href="education.html">Education</a>
    <a href="projects.html">Projects</a>
    <a href="templates.html">Templates</a>
    <a href="preview.html">Preview</a>
    <a href="publish.html">Publish</a>
    <a href="settings.html">Settings</a>
  </aside>

  <main class="education">

    <section class="education-header">
      <h1>Education</h1>
      <p>You can add only 2 education records</p>
    </section>

    <!-- UNIVERSITY -->
    <section class="add-education">
      <h2>1️⃣ University / Institute</h2>

      <div class="education-form">
        <input id="uniDegree" placeholder="Degree (e.g. B.Tech in CSE)">
        <input id="uniName" placeholder="University / Institute Name">
        <input id="uniYear" placeholder="Year (e.g. 2022 - 2026)">
        <input id="uniGrade" placeholder="CGPA / Grade (optional)">
      </div>
    </section>

    <!-- SCHOOL -->
    <section class="add-education">
      <h2>2️⃣ School Education</h2>

      <div class="education-form">
        <input id="schoolName" placeholder="School Name">
        <input id="schoolLocation" placeholder="Location">
        <input id="schoolYear" placeholder="Passed Out Year">
      </div>
    </section>

    <button class="save-btn" id="saveEducationBtn">Save Education</button>

    <!-- DISPLAY -->
    <section class="education-list">
      <h2>Your Education</h2>
      <div id="educationContainer"></div>
    </section>

  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4q_KzBCxVtS6mjH6Xh6-Bd1u-21RSNG4",
  authDomain: "portfoliox-2e787.firebaseapp.com",
  projectId: "portfoliox-2e787"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const saveBtn = document.getElementById("saveEducationBtn");
const container = document.getElementById("educationContainer");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "loginpage.html";
    return;
  }
  currentUser = user;
  loadEducation();
});

/* SAVE ONLY TWO EDUCATION TYPES */
saveBtn.addEventListener("click", async () => {

  const educationData = {
    university: {
      degree: uniDegree.value,
      name: uniName.value,
      year: uniYear.value,
      grade: uniGrade.value
    },
    school: {
      name: schoolName.value,
      location: schoolLocation.value,
      year: schoolYear.value
    }
  };

  await setDoc(
    doc(db, "users", currentUser.uid),
    { education: educationData },
    { merge: true }
  );

  alert("Education Saved Successfully ✅");
  loadEducation();
});

/* LOAD EDUCATION */
async function loadEducation() {
  container.innerHTML = "";

  const snap = await getDoc(doc(db, "users", currentUser.uid));
  if (!snap.exists()) return;

  const data = snap.data().education;
  if (!data) return;

  container.innerHTML = `
    <div class="education-card">
      <h3>${data.university.degree || ""}</h3>
      <p>${data.university.name || ""}</p>
      <span>${data.university.year || ""} ${data.university.grade ? "• " + data.university.grade : ""}</span>
    </div>

    <div class="education-card">
      <h3>School Education</h3>
      <p>${data.school.name || ""}</p>
      <span>${data.school.location || ""} • ${data.school.year || ""}</span>
    </div>
  `;
}

/* LOGOUT */
logoutBtn.onclick = async () => {
  await signOut(auth);
  window.location.href = "homepage.html";
};
</script>

</body>
</html>
